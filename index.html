<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豆畫工坊 - Pixel Art Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --cell-size: 14px;
        }

        /* 自定義捲軸 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d1d1d1; border-radius: 4px; }

        .canvas-grid {
            display: grid;
            background-color: #d1d5db;
            gap: 1px;
            border: 2px solid #4b5563;
            user-select: none;
            width: fit-content;
        }

        .pixel-cell {
            background-color: #ffffff;
            width: var(--cell-size);
            height: var(--cell-size);
            cursor: crosshair;
            transition: background-color 0.05s;
        }

        .pixel-cell:hover { filter: brightness(0.9); }

        /* 強化網格線 */
        .thick-border-right { border-right: 2px solid #4b5563 !important; }
        .thick-border-bottom { border-bottom: 2px solid #4b5563 !important; }

        .palette-btn.active {
            ring: 3px solid #3b82f6;
            transform: scale(1.1);
            z-index: 10;
        }

        .tool-btn.active {
            background-color: #3b82f6;
            color: white;
            border-color: #2563eb;
        }

        /* 座標尺精準對齊 */
        .ruler-container-top {
            display: grid;
            gap: 1px;
            margin-left: 34px;
        }

        .ruler-container-left {
            display: grid;
            gap: 1px;
            width: 32px;
        }

        .ruler-label {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #9ca3af;
            font-family: monospace;
            font-weight: bold;
        }

        .inventory-card {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            background: #f8fafc;
            border-radius: 6px;
            font-size: 14px;
            border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-stone-200 p-4 shadow-sm flex flex-wrap justify-between items-center z-20">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3 1.912 5.886h6.188l-5.004 3.636 1.912 5.886L12 14.772l-5.008 3.636 1.912-5.886L3.9 8.886h6.188L12 3z"/></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-indigo-900">豆畫工坊 <span class="text-indigo-500 font-normal">Pixel Art</span></h1>
            </div>
        </div>

        <div class="flex items-center gap-2 md:gap-4">
            <div class="flex bg-stone-200 p-1 rounded-lg">
                <button onclick="changeCanvasSize(52)" id="size-52" class="px-3 md:px-4 py-1.5 rounded-md text-xs md:text-sm font-bold transition-all bg-white shadow-sm">52x52</button>
                <button onclick="changeCanvasSize(74)" id="size-74" class="px-3 md:px-4 py-1.5 rounded-md text-xs md:text-sm font-bold transition-all text-stone-500 hover:text-stone-700">74x74</button>
            </div>
            
            <div class="h-8 w-px bg-stone-200"></div>

            <button onclick="undo()" class="flex items-center gap-1 px-3 py-1.5 bg-white border border-stone-300 rounded-lg text-xs font-bold hover:bg-stone-50 transition-all active:translate-y-0.5">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                復原
            </button>

            <button onclick="exportImage()" class="flex items-center gap-1 px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-bold hover:bg-indigo-700 transition-all shadow-md active:scale-95">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                下載圖片
            </button>

            <button onclick="clearCanvas()" class="px-3 py-1.5 bg-rose-50 text-rose-600 border border-rose-100 rounded-lg text-xs font-bold hover:bg-rose-100 transition-all">清空</button>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <!-- Sidebar -->
        <aside class="w-72 bg-white border-r border-stone-200 flex flex-col h-full shadow-lg z-10">
            <!-- Tools Section -->
            <div class="p-4 border-b border-stone-100 grid grid-cols-2 gap-2">
                <button id="tool-paint" onclick="setTool('paint')" class="tool-btn active flex items-center justify-center gap-2 py-2 border rounded-lg font-bold text-sm transition-all shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/><path d="M2 2l5 5"/><path d="M11 11l1 1"/></svg>
                    畫筆
                </button>
                <button id="tool-eraser" onclick="setTool('eraser')" class="tool-btn flex items-center justify-center gap-2 py-2 border rounded-lg font-bold text-sm transition-all shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21Z"/><path d="m22 21-10-10"/><path d="m5 11 9 9"/></svg>
                    橡皮擦
                </button>
            </div>

            <!-- Current Color Info -->
            <div class="p-4 border-b border-stone-100 bg-stone-50">
                <div class="flex items-center gap-3">
                    <div id="current-color-preview" class="w-12 h-12 rounded-lg border-2 border-white shadow-md"></div>
                    <div>
                        <div id="current-color-id" class="font-bold text-lg leading-none">未選擇</div>
                        <div id="current-color-hex" class="text-xs text-stone-400 font-mono">#FFFFFF</div>
                    </div>
                </div>
            </div>
            
            <!-- Palette -->
            <div id="palette-container" class="flex-1 overflow-y-auto p-4 space-y-6"></div>
        </aside>

        <!-- Canvas Area -->
        <section class="flex-1 overflow-auto p-8 flex flex-col items-center">
            <div id="canvas-wrapper" class="inline-block bg-white p-2 shadow-2xl rounded-sm">
                <!-- Top Ruler -->
                <div id="top-ruler" class="ruler-container-top"></div>

                <div class="flex">
                    <!-- Left Ruler -->
                    <div id="left-ruler" class="ruler-container-left"></div>
                    <!-- Grid -->
                    <div id="grid" class="canvas-grid"></div>
                </div>
            </div>

            <!-- Inventory Section -->
            <div class="mt-8 w-full max-w-4xl bg-white rounded-xl shadow-sm border border-stone-200 p-6 mb-12">
                <div class="flex items-center justify-between mb-4 border-b pb-2">
                    <h3 class="font-bold text-stone-600 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-7 7-4-4"/></svg>
                        顏色用量統計
                    </h3>
                    <span id="total-beads" class="text-xs font-bold bg-indigo-100 px-2 py-1 rounded text-indigo-600 uppercase">總計: 0 顆</span>
                </div>
                <div id="inventory-list" class="flex flex-wrap gap-3 text-stone-600 text-sm">
                    畫布上目前沒有顏色...
                </div>
            </div>
        </section>
    </main>

    <script>
        const COLOR_DATA = {
            "A": { "A1": "#FAF4C8", "A2": "#FFFFD5", "A3": "#FEFF8B", "A4": "#FBED56", "A5": "#F4D738", "A6": "#FEAC4C", "A7": "#FE8B4C", "A8": "#FFDA45", "A9": "#FF995B", "A10": "#F77C31", "A11": "#FFDD99", "A12": "#FE9F72", "A13": "#FFC365", "A14": "#FD543D", "A15": "#FFF365", "A16": "#FFFF9F", "A17": "#FFE36E", "A18": "#FEBE7D", "A19": "#FD7C72", "A20": "#FFD568", "A21": "#FFE395", "A22": "#F4F57D", "A23": "#E6C9B7", "A24": "#F7F8A2", "A25": "#FFD67D", "A26": "#FFC830" },
            "B": { "B1": "#E6EE31", "B2": "#63F347", "B3": "#9EF780", "B4": "#5DE035", "B5": "#35E352", "B6": "#65E2A6", "B7": "#3DAF80", "B8": "#1C9C4F", "B9": "#27523A", "B10": "#95D3C2", "B11": "#5D722A", "B12": "#166F41", "B13": "#CAEB7B", "B14": "#ADE946", "B15": "#2E5132", "B16": "#C5ED9C", "B17": "#9BB13A", "B18": "#E6EE49", "B19": "#24B88C", "B20": "#C2F0CC", "B21": "#156A6B", "B22": "#0B3C43", "B23": "#303A21", "B24": "#EEFCA5", "B25": "#4E846D", "B26": "#8D7A35", "B27": "#CCE1AF", "B28": "#9EE5B9", "B29": "#C5E254", "B30": "#E2FCB1", "B31": "#B0E792", "B32": "#9CAB5A" },
            "C": { "C1": "#E8FFE7", "C2": "#A9F9FC", "C3": "#A0E2FB", "C4": "#41CCFF", "C5": "#01ACEB", "C6": "#50AAF0", "C7": "#3677D2", "C8": "#0F54C0", "C9": "#324BCA", "C10": "#3EBCE2", "C11": "#28DDDE", "C12": "#1C334D", "C13": "#CDE8FF", "C14": "#D5FDFF", "C15": "#22C4C6", "C16": "#1557A8", "C17": "#04D1F6", "C18": "#1D3344", "C19": "#1887A2", "C20": "#176DAF", "C21": "#BEDDFF", "C22": "#67B4BE", "C23": "#C8E2FF", "C24": "#7CC4FF", "C25": "#A9E5E5", "C26": "#3CAED8", "C27": "#D3DFFA", "C28": "#BBCFED", "C29": "#34488E" },
            "D": { "D1": "#AEB4F2", "D2": "#858EDD", "D3": "#2F54AF", "D4": "#182A84", "D5": "#B843C5", "D6": "#AC7BDE", "D7": "#8854B3", "D8": "#E2D3FF", "D9": "#D5B9F8", "D10": "#361851", "D11": "#B9BAE1", "D12": "#DE9AD4", "D13": "#B90095", "D14": "#8B279B", "D15": "#2F1F90", "D16": "#E3E1EE", "D17": "#C4D4F6", "D18": "#A45EC7", "D19": "#D8C3D7", "D20": "#9C32B2", "D21": "#9A009B", "D22": "#333A95", "D23": "#EBDAFC", "D24": "#7786E5", "D25": "#494FC7", "D26": "#DFC2F8" },
            "E": { "E1": "#FDD3CC", "E2": "#FEC0DF", "E3": "#FFB7E7", "E4": "#E8649E", "E5": "#F551A2", "E6": "#F13D74", "E7": "#C63478", "E8": "#FFDBE9", "E9": "#E970CC", "E10": "#D33793", "E11": "#FCDDD2", "E12": "#F78FC3", "E13": "#B5006D", "E14": "#FFD1BA", "E15": "#F8C7C9", "E16": "#FFF3EB", "E17": "#FFE2EA", "E18": "#FFC7DB", "E19": "#FEBAD5", "E20": "#D8C7D1", "E21": "#BD9DA1", "E22": "#B785A1", "E23": "#937A8D", "E24": "#E1BCE8" },
            "F": { "F1": "#FD957B", "F2": "#FC3D46", "F3": "#F74941", "F4": "#FC283C", "F5": "#E7002F", "F6": "#943630", "F7": "#971937", "F8": "#BC0028", "F9": "#E2677A", "F10": "#8A4526", "F11": "#5A2121", "F12": "#FD4E6A", "F13": "#F35744", "F14": "#FFA9AD", "F15": "#D30022", "F16": "#FEC2A6", "F17": "#E69C79", "F18": "#D37C46", "F19": "#C1444A", "F20": "#CD9391", "F21": "#F7B4C6", "F22": "#FDC0D0", "F23": "#F67E66", "F24": "#E698AA", "F25": "#E54B4F" },
            "G": { "G1": "#FFE2CE", "G2": "#FFC4AA", "G3": "#F4C3A5", "G4": "#E1B383", "G5": "#EDB045", "G6": "#E99C17", "G7": "#9D5B3E", "G8": "#753832", "G9": "#E6B483", "G10": "#D98C39", "G11": "#E0C593", "G12": "#FFC890", "G13": "#B7714A", "G14": "#8D614C", "G15": "#FCF9E0", "G16": "#F2D9BA", "G17": "#78524B", "G18": "#FFE4CC", "G19": "#E07935", "G20": "#A94023", "G21": "#B88558" },
            "H": { "H1": "#FDFBFF", "H2": "#FEFFFF", "H3": "#B6B1BA", "H4": "#89858C", "H5": "#48464E", "H6": "#2F2B2F", "H7": "#000000", "H8": "#E7D6DB", "H9": "#EDEDED", "H10": "#EEE9EA", "H11": "#CECDD5", "H12": "#FFF5ED", "H13": "#F5ECD2", "H14": "#CFD7D3", "H15": "#98A6A8", "H16": "#1D1414", "H17": "#F1EDED", "H18": "#FFFDF0", "H19": "#F6EFE2", "H20": "#949FA3", "H21": "#FFFBE1", "H22": "#CACAD4", "H23": "#9A9D94" },
            "M": { "M1": "#BCC6B8", "M2": "#8AA386", "M3": "#697D80", "M4": "#E3D2BC", "M5": "#D0CCAA", "M6": "#B0A782", "M7": "#B4A497", "M8": "#B38281", "M9": "#A58767", "M10": "#C5B2BC", "M11": "#9F7594", "M12": "#644749", "M13": "#D19066", "M14": "#C77362", "M15": "#757D78" },
            "R": { "R1": "#D50D21", "R2": "#F92F83", "R3": "#FD8324", "R4": "#F8EC31", "R5": "#35C75B", "R6": "#238891", "R7": "#19779D", "R8": "#1A60C3", "R9": "#9A56B4", "R10": "#FFDB4C", "R11": "#FFEBFB", "R12": "#D8D5CE", "R13": "#55514C", "R14": "#9FE4DF", "R15": "#77CEE9", "R16": "#3ECFCA", "R17": "#4A867A", "R18": "#7FCD9D", "R19": "#CDE55D", "R20": "#E8C7B4", "R21": "#AD6F3C", "R22": "#6C372F", "R23": "#FEB872", "R24": "#F3C1C0", "R25": "#C9675E", "R26": "#D293BE", "R27": "#EA8CB1", "R28": "#9C87D6" }
        };


        let currentSize = 52;
        let selectedColorHex = "#000000";
        let selectedColorId = "H7";
        let isMouseDown = false;
        let currentTool = 'paint'; 
        let gridState = {}; 
        let undoStack = []; 
        const maxUndo = 50;

        const grid = document.getElementById('grid');
        const paletteContainer = document.getElementById('palette-container');
        const inventoryList = document.getElementById('inventory-list');

        function initPalette() {
            paletteContainer.innerHTML = '';
            for (const group in COLOR_DATA) {
                const groupDiv = document.createElement('div');
                groupDiv.innerHTML = `<h3 class="text-xs font-black text-stone-400 mb-2 px-1 uppercase tracking-widest">${group} 系列</h3>`;
                const colorGrid = document.createElement('div');
                colorGrid.className = 'grid grid-cols-5 gap-2';
                for (const [id, hex] of Object.entries(COLOR_DATA[group])) {
                    const btn = document.createElement('button');
                    btn.className = `palette-btn w-10 h-10 rounded-md border border-stone-200 shadow-sm transition-all hover:scale-110 active:scale-95`;
                    btn.style.backgroundColor = hex;
                    btn.id = `color-${id}`;
                    btn.title = id;
                    btn.onclick = () => {
                        setTool('paint');
                        selectColor(id, hex);
                    };
                    colorGrid.appendChild(btn);
                }
                groupDiv.appendChild(colorGrid);
                paletteContainer.appendChild(groupDiv);
            }
            selectColor("H7", "#000000");
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tool-${tool}`).classList.add('active');
        }

        function selectColor(id, hex) {
            selectedColorId = id;
            selectedColorHex = hex;
            document.getElementById('current-color-preview').style.backgroundColor = hex;
            document.getElementById('current-color-id').innerText = id;
            document.getElementById('current-color-hex').innerText = hex.toUpperCase();
            document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`color-${id}`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        function saveHistory() {
            undoStack.push(JSON.stringify(gridState));
            if (undoStack.length > maxUndo) undoStack.shift();
        }

        function undo() {
            if (undoStack.length === 0) return;
            gridState = JSON.parse(undoStack.pop());
            document.querySelectorAll('.pixel-cell').forEach((cell, i) => {
                const colorId = gridState[i];
                cell.style.backgroundColor = colorId ? findHexById(colorId) : '#ffffff';
            });
            updateInventoryUI();
        }

        function findHexById(id) {
            for (const g in COLOR_DATA) {
                if (COLOR_DATA[g][id]) return COLOR_DATA[g][id];
            }
            return "#ffffff";
        }

        function initCanvas(size) {
            currentSize = size;
            grid.innerHTML = '';
            document.getElementById('top-ruler').innerHTML = '';
            document.getElementById('left-ruler').innerHTML = '';
            gridState = {};
            undoStack = [];
            
            const cellSize = size === 52 ? '14px' : '10px';
            document.documentElement.style.setProperty('--cell-size', cellSize);

            grid.style.gridTemplateColumns = `repeat(${size}, var(--cell-size))`;
            const topRuler = document.getElementById('top-ruler');
            topRuler.style.gridTemplateColumns = `repeat(${size}, var(--cell-size))`;
            const leftRuler = document.getElementById('left-ruler');
            leftRuler.style.gridTemplateRows = `repeat(${size}, var(--cell-size))`;

            for (let i = 1; i <= size; i++) {
                const labelT = document.createElement('div');
                labelT.className = `ruler-label`;
                labelT.innerText = i % 5 === 0 || i === 1 ? i : '';
                topRuler.appendChild(labelT);
                
                const labelL = document.createElement('div');
                labelL.className = `ruler-label`;
                labelL.innerText = i % 5 === 0 || i === 1 ? i : '';
                leftRuler.appendChild(labelL);
            }

            const fragment = document.createDocumentFragment();
            for (let i = 0; i < size * size; i++) {
                const row = Math.floor(i / size) + 1;
                const col = (i % size) + 1;
                const cell = document.createElement('div');
                cell.className = 'pixel-cell';
                if (col % 10 === 0 && col !== size) cell.classList.add('thick-border-right');
                if (row % 10 === 0 && row !== size) cell.classList.add('thick-border-bottom');

                cell.onmousedown = (e) => {
                    saveHistory();
                    isMouseDown = true;
                    paintCell(cell, i);
                };
                cell.onmouseenter = () => { if (isMouseDown) paintCell(cell, i); };
                fragment.appendChild(cell);
            }
            grid.appendChild(fragment);
            updateInventoryUI();
        }

        function paintCell(cell, index) {
            if (currentTool === 'paint') {
                gridState[index] = selectedColorId;
                cell.style.backgroundColor = selectedColorHex;
            } else {
                delete gridState[index];
                cell.style.backgroundColor = '#ffffff';
            }
            updateInventoryUI();
        }

        function updateInventoryUI() {
            const counts = {};
            Object.values(gridState).forEach(id => counts[id] = (counts[id] || 0) + 1);
            const sortedIds = Object.keys(counts).sort();
            
            if (sortedIds.length === 0) {
                inventoryList.innerHTML = '畫布上目前沒有顏色...';
                document.getElementById('total-beads').innerText = `總計: 0 顆`;
                return;
            }

            let total = 0;
            inventoryList.innerHTML = '';
            sortedIds.forEach(id => {
                total += counts[id];
                const hex = findHexById(id);
                const item = document.createElement('div');
                item.className = 'inventory-card shadow-sm';
                item.innerHTML = `<span class="w-4 h-4 rounded-sm border border-stone-200 shadow-inner flex-shrink-0" style="background-color:${hex}"></span><b class="text-stone-700 font-bold">${id}</b><span class="text-indigo-500 font-mono text-xs font-bold">${counts[id]}</span>`;
                inventoryList.appendChild(item);
            });
            document.getElementById('total-beads').innerText = `總計: ${total} 顆`;
        }

        function changeCanvasSize(size) {
            if (confirm(`切換到 ${size}x${size} 會清空目前進度，確定嗎？`)) {
                document.getElementById('size-52').classList.toggle('bg-white', size === 52);
                document.getElementById('size-74').classList.toggle('bg-white', size === 74);
                initCanvas(size);
            }
        }

        function clearCanvas() {
            if (confirm('確定要清空整張畫布嗎？')) {
                saveHistory();
                document.querySelectorAll('.pixel-cell').forEach(cell => cell.style.backgroundColor = '#ffffff');
                gridState = {};
                updateInventoryUI();
            }
        }

        // 匯出圖片
        function exportImage() {
            const scale = 10; 
            const canvas = document.createElement('canvas');
            canvas.width = currentSize * scale;
            canvas.height = currentSize * scale;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < currentSize * currentSize; i++) {
                const colorId = gridState[i];
                if (colorId) {
                    const row = Math.floor(i / currentSize);
                    const col = i % currentSize;
                    ctx.fillStyle = findHexById(colorId);
                    ctx.fillRect(col * scale, row * scale, scale, scale);
                }
            }

            const link = document.createElement('a');
            link.download = `豆畫_${currentSize}x${currentSize}_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        window.onmouseup = () => { isMouseDown = false; };
        window.onload = () => { initPalette(); initCanvas(52); };
    </script>
</body>
</html>
