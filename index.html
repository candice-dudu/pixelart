<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
     <link rel="apple-touch-icon" href="./pixel.png">
    <title>豆圖工坊 - Pixel Art Studio Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --cell-size: 14px; }
        body { overflow: hidden; height: 100vh; touch-action: manipulation; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #d1d1d1; border-radius: 10px; }

        /* 佈局容器 */
        .app-container { display: flex; height: calc(100vh - 80px); overflow: hidden; flex-direction: row; }
        .sidebar { width: 300px; flex-shrink: 0; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; height: 100%; background: white; z-index: 40; }
        .main-content { flex: 1; overflow: auto; padding: 2rem; display: flex; flex-direction: column; align-items: center; background: #f5f5f4; position: relative; }

        /* 手機版適配 */
        @media (max-width: 767px) {
            header { height: auto !important; padding: 0.5rem !important; }
            .app-container { flex-direction: column; height: calc(100vh - 120px); }
            .sidebar { width: 100%; height: 180px; border-right: none; border-top: 1px solid #e5e7eb; order: 2; }
            .main-content { order: 1; padding: 1rem; }
            .palette-grid { display: flex !important; overflow-x: auto; white-space: nowrap; padding-bottom: 5px; gap: 4px; }
            .palette-btn { flex-shrink: 0; width: 40px !important; height: 40px !important; }
            .control-panel { flex-wrap: wrap; justify-content: center; gap: 0.5rem; }
        }

        .canvas-grid { display: grid; gap: 0px; border: 2px solid #4b5563; user-select: none; width: fit-content; position: relative; z-index: 10; background-color: transparent; }
        .pixel-cell { width: var(--cell-size); height: var(--cell-size); cursor: crosshair; display: flex; align-items: center; justify-content: center; font-family: monospace; font-weight: bold; pointer-events: auto; box-shadow: inset 0 0 0 0.5px rgba(0, 0, 0, 0.15); box-sizing: border-box; }
        .thick-border-right { border-right: 2px solid #4b5563 !important; }
        .thick-border-bottom { border-bottom: 2px solid #4b5563 !important; }

        /* 底圖 */
        #reference-image-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; display: flex; align-items: center; justify-content: center; overflow: hidden; background-color: #ffffff; }
        #reference-image { max-width: none; transform-origin: center; opacity: 0.5; display: none; }
        /* 左邊欄色塊樣式優化 */
        .palette-btn { 
            display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: 900; font-family: sans-serif;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }
        .palette-btn.active { ring: 3px solid #3b82f6; transform: scale(1.1); z-index: 10; }
        .tool-btn.active { background-color: #3b82f6; color: white; border-color: #2563eb; }
        
        .ruler-container-top { display: grid; gap: 0px; margin-left: 34px; }
        .ruler-container-left { display: grid; gap: 0px; width: 32px; }
        .ruler-label { display: flex; align-items: center; justify-content: center; font-size: 9px; color: #9ca3af; font-weight: bold; }
        
        .cell-label { font-size: calc(var(--cell-size) * 0.45); display: none; text-shadow: 0px 0px 2px rgba(255,255,255,0.8); pointer-events: none; }
        .show-labels .cell-label { display: block; }
        
        .scale-input { width: 50px; padding: 1px 4px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 10px; text-align: center; font-weight: bold; }
        .control-label { font-size: 9px; font-weight: 800; color: #9ca3af; text-transform: uppercase; margin-right: 2px; }
    </style>
</head>
<body class="bg-stone-100 text-stone-800 flex flex-col">

    <!-- Header 頂部控制列 -->
    <header class="min-h-20 bg-white border-b border-stone-200 px-4 shadow-sm flex flex-none flex-wrap justify-between items-center z-30 py-2 control-panel">
        <div class="flex items-center gap-2 flex-none">
            <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3 1.912 5.886h6.188l-5.004 3.636 1.912 5.886L12 14.772l-5.008 3.636 1.912-5.886L3.9 8.886h6.188L12 3z"/></svg>
            </div>
            <h1 class="text-sm font-black text-indigo-900 uppercase tracking-tighter hidden sm:block">豆圖工坊Pro</h1>
        </div>

        <!-- 底圖控制區 -->
        <div class="flex flex-col gap-1 bg-stone-50 p-1.5 px-3 rounded-xl border border-stone-200 shadow-inner">
            <div class="flex items-center gap-3">
                <div class="flex items-center">
                    <input type="file" id="ref-upload" accept="image/*" class="hidden" onchange="loadReferenceImage(event)">
                    <button onclick="document.getElementById('ref-upload').click()" class="bg-white border px-2 py-0.5 rounded text-[10px] font-bold shadow-sm hover:bg-stone-100">上傳底圖</button>
                    <button onclick="removeReferenceImage()" class="ml-1 text-rose-400 hover:text-rose-600">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
                <div class="flex items-center gap-1">
                    <span class="control-label">透明</span>
                    <input type="range" id="opacity-slider" min="0" max="1" step="0.05" value="0.5" class="w-12 h-1 cursor-pointer" oninput="updateRefStyle('opacity', this.value)">
                </div>
                <div class="flex items-center">
                    <span class="control-label">縮放</span>
                    <input type="number" id="scale-number" min="10" max="500" step="0.1" value="100" class="scale-input" oninput="updateRefStyle('scalePercent', this.value)">
                    <span class="text-[9px] font-bold text-stone-400 ml-0.5">%</span>
                </div>
            </div>
            <div class="flex items-center gap-3 justify-between">
                <div class="flex items-center gap-1">
                    <span class="control-label">左右</span>
                    <input type="range" id="x-slider" min="-500" max="500" step="1" value="0" class="w-20 h-1 cursor-pointer" oninput="updateRefStyle('x', this.value)">
                </div>
                <div class="flex items-center gap-1">
                    <span class="control-label">上下</span>
                    <input type="range" id="y-slider" min="-500" max="500" step="1" value="0" class="w-20 h-1 cursor-pointer" oninput="updateRefStyle('y', this.value)">
                </div>
            </div>
        </div>

        <!-- 功能按鈕區 -->
        <div class="flex items-center gap-2 flex-none">
            <div class="flex bg-stone-200 p-1 rounded-lg">
                <button onclick="changeCanvasSize(52)" id="size-52" class="px-3 py-1 rounded-md text-xs font-bold transition-all bg-white shadow-sm">52</button>
                <button onclick="changeCanvasSize(74)" id="size-74" class="px-3 py-1 rounded-md text-xs font-bold transition-all text-stone-500">74</button>
            </div>
            <!-- 搬返黎呢度 -->
            <button id="toggle-label-btn" onclick="toggleLabels()" class="px-3 py-1.5 bg-stone-100 border border-stone-300 rounded-lg text-xs font-bold hover:bg-stone-200 transition-all">編號: 關</button>
            <button onclick="undo()" class="px-3 py-1.5 bg-white border border-stone-300 rounded-lg text-xs font-bold shadow-sm active:translate-y-0.5">復原</button>
            <button onclick="exportImage()" class="px-3 py-1.5 bg-indigo-600 text-white rounded-lg text-xs font-bold shadow-md hover:bg-indigo-700">下載圖紙</button>
            <button onclick="clearCanvas()" class="px-2 py-1.5 bg-rose-50 text-rose-600 border border-rose-100 rounded-lg text-xs font-bold">清空</button>
        </div>
    </header>

    <div class="app-container">
        <!-- 側邊欄 -->
        <aside class="sidebar shadow-xl">
            <div class="p-3 border-b grid grid-cols-3 gap-2 flex-none">
                <button id="tool-paint" onclick="setTool('paint')" class="tool-btn active flex flex-col items-center py-2 border rounded-lg font-bold text-[10px] shadow-sm">畫筆</button>
                <button id="tool-bucket" onclick="setTool('bucket')" class="tool-btn flex flex-col items-center py-2 border rounded-lg font-bold text-[10px] shadow-sm">倒油</button>
                <button id="tool-eraser" onclick="setTool('eraser')" class="tool-btn flex flex-col items-center py-2 border rounded-lg font-bold text-[10px] shadow-sm">抹走</button>
            </div>
            <div class="p-3 border-b bg-stone-50 flex items-center justify-around flex-none">
                <div id="current-color-preview" class="w-12 h-12 rounded-lg border-2 border-white shadow-md"></div>
                <div class="text-center">
                    <div id="current-color-id" class="font-bold text-lg leading-none text-indigo-900">未選</div>
                    <div id="current-color-hex" class="text-[9px] text-stone-400 font-mono uppercase mt-1">#FFFFFF</div>
                </div>
            </div>
            <div id="palette-container" class="flex-1 overflow-y-auto p-3 space-y-5"></div>
        </aside>

        <!-- 主內容區 -->
        <main class="main-content">
            <div id="canvas-wrapper" class="inline-block bg-white p-4 shadow-2xl rounded-sm mb-8 relative flex-none">
                <div id="top-ruler" class="ruler-container-top"></div>
                <div class="flex relative">
                    <div id="left-ruler" class="ruler-container-left"></div>
                    <div class="relative">
                        <div id="grid" class="canvas-grid"></div>
                        <div id="reference-image-container"><img id="reference-image" src="" alt=""></div>
                    </div>
                </div>
            </div>
            <!-- 用量統計 -->
            <div class="w-full max-w-4xl bg-white rounded-xl shadow-sm border p-6 mb-20 flex-none">
                <div class="flex justify-between mb-4 border-b pb-2 font-bold text-stone-600">
                    <span>顏色用量統計</span>
                    <span id="total-beads" class="text-indigo-600 uppercase text-xs">總計: 0 顆</span>
                </div>
                <div id="inventory-list" class="flex flex-wrap gap-3 text-sm font-bold"></div>
            </div>
        </main>
    </div>

    <script>
        const COLOR_DATA = {
            "A": { "A1": "#FAF4C8", "A2": "#FFFFD5", "A3": "#FEFF8B", "A4": "#FBED56", "A5": "#F4D738", "A6": "#FEAC4C", "A7": "#FE8B4C", "A8": "#FFDA45", "A9": "#FF995B", "A10": "#F77C31", "A11": "#FFDD99", "A12": "#FE9F72", "A13": "#FFC365", "A14": "#FD543D", "A15": "#FFF365", "A16": "#FFFF9F", "A17": "#FFE36E", "A18": "#FEBE7D", "A19": "#FD7C72", "A20": "#FFD568", "A21": "#FFE395", "A22": "#F4F57D", "A23": "#E6C9B7", "A24": "#F7F8A2", "A25": "#FFD67D", "A26": "#FFC830" },
            "B": { "B1": "#E6EE31", "B2": "#63F347", "B3": "#9EF780", "B4": "#5DE035", "B5": "#35E352", "B6": "#65E2A6", "B7": "#3DAF80", "B8": "#1C9C4F", "B9": "#27523A", "B10": "#95D3C2", "B11": "#5D722A", "B12": "#166F41", "B13": "#CAEB7B", "B14": "#ADE946", "B15": "#2E5132", "B16": "#C5ED9C", "B17": "#9BB13A", "B18": "#E6EE49", "B19": "#24B88C", "B20": "#C2F0CC", "B21": "#156A6B", "B22": "#0B3C43", "B23": "#303A21", "B24": "#EEFCA5", "B25": "#4E846D", "B26": "#8D7A35", "B27": "#CCE1AF", "B28": "#9EE5B9", "B29": "#C5E254", "B30": "#E2FCB1", "B31": "#B0E792", "B32": "#9CAB5A" },
            "C": { "C1": "#E8FFE7", "C2": "#A9F9FC", "C3": "#A0E2FB", "C4": "#41CCFF", "C5": "#01ACEB", "C6": "#50AAF0", "C7": "#3677D2", "C8": "#0F54C0", "C9": "#324BCA", "C10": "#3EBCE2", "C11": "#28DDDE", "C12": "#1C334D", "C13": "#CDE7FE", "C14": "#D5FDFF", "C15": "#22C4C6", "C16": "#1557A8", "C17": "#04D1F6", "C18": "#1D3344", "C19": "#1887A2", "C20": "#176DAF", "C21": "#BEDDFF", "C22": "#67B4BE", "C23": "#C8E2FF", "C24": "#7CC4FF", "C25": "#A9E5E5", "C26": "#3CAED8", "C27": "#D3DFFA", "C28": "#BBCFED", "C29": "#34488E" },
            "D": { "D1": "#AEB4F2", "D2": "#858EDD", "D3": "#2F54AF", "D4": "#182A84", "D5": "#B843C5", "D6": "#AC7BDE", "D7": "#8854B3", "D8": "#E3D2FE", "D9": "#D5B9F4", "D10": "#361851", "D11": "#B9BAE1", "D12": "#DE9AD4", "D13": "#B90095", "D14": "#8B279B", "D15": "#2F1F90", "D16": "#E3E1EE", "D17": "#C4D4F6", "D18": "#A45EC7", "D19": "#D8C3D7", "D20": "#9C32B2", "D21": "#9A009B", "D22": "#333A95", "D23": "#EBDAFC", "D24": "#7786E5", "D25": "#494FC7", "D26": "#DFC2F8" },
            "E": { "E1": "#FDD3CC", "E2": "#FEC0DF", "E3": "#FFB7E7", "E4": "#E8649E", "E5": "#F551A2", "E6": "#F13D74", "E7": "#C63478", "E8": "#FDDBE9", "E9": "#E970CC", "E10": "#D33793", "E11": "#FCDDD2", "E12": "#F78FC3", "E13": "#B5006D", "E14": "#FFD1BA", "E15": "#F8C7C9", "E16": "#FFF3EB", "E17": "#FFE2EA", "E18": "#FFC7DB", "E19": "#FEBAD5", "E20": "#D8C7D1", "E21": "#BD9DA1", "E22": "#B785A1", "E23": "#937A8D", "E24": "#E1BCE8" },
            "F": { "F1": "#FD957B", "F2": "#FC3D46", "F3": "#F74941", "F4": "#FC283C", "F5": "#E7002F", "F6": "#943630", "F7": "#971937", "F8": "#BC0028", "F9": "#E2677A", "F10": "#8A4526", "F11": "#5A2121", "F12": "#FD4E6A", "F13": "#F35744", "F14": "#FFA9AD", "F15": "#D30022", "F16": "#FEC2A6", "F17": "#E69C79", "F18": "#D37C46", "F19": "#C1444A", "F20": "#CD9391", "F21": "#F7B4C6", "F22": "#FDC0D0", "F23": "#F67E66", "F24": "#E698AA", "F25": "#E54B4F" },
            "G": { "G1": "#FFE2CE", "G2": "#FFC4AA", "G3": "#F4C3A5", "G4": "#E1B383", "G5": "#EDB045", "G6": "#E99C17", "G7": "#9D5B3E", "G8": "#753832", "G9": "#E6B483", "G10": "#D98C39", "G11": "#E0C593", "G12": "#FFC890", "G13": "#B7714A", "G14": "#8D614C", "G15": "#FCF9E0", "G16": "#F2D9BA", "G17": "#78524B", "G18": "#FFE4CC", "G19": "#E07935", "G20": "#A94023", "G21": "#B88558" },
            "H": { "H1": "#FDFBFF", "H2": "#FEFFFF", "H3": "#B6B1BA", "H4": "#89858C", "H5": "#48464E", "H6": "#2F2B2F", "H7": "#000000", "H8": "#E7D6DB", "H9": "#EDEDED", "H10": "#EEE9EA", "H11": "#CECDD5", "H12": "#FFF5ED", "H13": "#F5ECD2", "H14": "#CFD7D3", "H15": "#98A6A8", "H16": "#1D1414", "H17": "#F1EDED", "H18": "#FFFDF0", "H19": "#F6EFE2", "H20": "#949FA3", "H21": "#FFFBE1", "H22": "#CACAD4", "H23": "#9A9D94" },
            "M": { "M1": "#BCC6B8", "M2": "#8AA386", "M3": "#697D80", "M4": "#E3D2BC", "M5": "#D0CCAA", "M6": "#B0A782", "M7": "#B4A497", "M8": "#B38281", "M9": "#A58767", "M10": "#C5B2BC", "M11": "#9F7594", "M12": "#644749", "M13": "#D19066", "M14": "#C77362", "M15": "#757D78" },
            "R": { "R1": "#D50D21", "R2": "#F92F83", "R3": "#FD8324", "R4": "#F8EC31", "R5": "#35C75B", "R6": "#238891", "R7": "#19779D", "R8": "#1A60C3", "R9": "#9A56B4", "R10": "#FFDB4C", "R11": "#FFEBFB", "R12": "#D8D5CE", "R13": "#55514C", "R14": "#9FE4DF", "R15": "#77CEE9", "R16": "#3ECFCA", "R17": "#4A867A", "R18": "#7FCD9D", "R19": "#CDE55D", "R20": "#E8C7B4", "R21": "#AD6F3C", "R22": "#6C372F", "R23": "#FEB872", "R24": "#F3C1C0", "R25": "#C9675E", "R26": "#D293BE", "R27": "#EA8CB1", "R28": "#9C87D6" }
        };

        let currentSize = 52; let selectedColorHex = "#000000"; let selectedColorId = "H7";
        let isMouseDown = false; let currentTool = 'paint'; let gridState = {}; let undoStack = []; let isShowLabels = false;
        let refSettings = { opacity: 0.5, scale: 1, x: 0, y: 0 };

       function initPalette() {
    const container = document.getElementById('palette-container');
    container.innerHTML = '';
    for (const group in COLOR_DATA) {
        const groupDiv = document.createElement('div');
        groupDiv.innerHTML = `<h3 class="text-xs font-black text-stone-400 mb-2 px-1 uppercase tracking-widest">${group} 系列</h3>`;
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-5 gap-2 palette-grid';
        
        for (const [id, hex] of Object.entries(COLOR_DATA[group])) {
            const btn = document.createElement('button');
            // 改動點 1：基礎樣式
            btn.className = `palette-btn w-10 h-10 rounded-md border border-stone-200 shadow-sm`;
            btn.style.backgroundColor = hex;
            btn.id = `color-${id}`;
            
            // 改動點 2：直接在按鈕內寫入編號文字
            btn.innerText = id; 
            
            // 改動點 3：根據背景深淺設定文字顏色（黑或白）
            btn.style.color = getContrastYIQ(hex);
            
            btn.onclick = () => { setTool('paint'); selectColor(id, hex); };
            grid.appendChild(btn);
        }
        groupDiv.appendChild(grid);
        container.appendChild(groupDiv);
    }
    selectColor("H7", "#000000");
}

        function loadReferenceImage(e) {
            const f = e.target.files[0];
            if (f) {
                const r = new FileReader();
                r.onload = (ev) => {
                    const img = document.getElementById('reference-image');
                    img.src = ev.target.result; img.style.display = "block";
                    resetRefSettings();
                };
                r.readAsDataURL(f);
            }
        }

        function resetRefSettings() {
            refSettings = { opacity: 0.5, scale: 1, x: 0, y: 0 };
            document.getElementById('opacity-slider').value = 0.5;
            document.getElementById('scale-number').value = 100;
            document.getElementById('x-slider').value = 0;
            document.getElementById('y-slider').value = 0;
            applyRefStyle();
        }

        function updateRefStyle(t, v) {
            if (t === 'scalePercent') refSettings.scale = parseFloat(v) / 100;
            else refSettings[t] = parseFloat(v);
            applyRefStyle();
        }

        function applyRefStyle() {
            const i = document.getElementById('reference-image');
            i.style.opacity = refSettings.opacity;
            i.style.transform = `scale(${refSettings.scale}) translate(${refSettings.x}px, ${refSettings.y}px)`;
        }

        function removeReferenceImage() {
            const i = document.getElementById('reference-image');
            i.src = ""; i.style.display = "none";
            document.getElementById('ref-upload').value = "";
        }

        function toggleLabels() {
            isShowLabels = !isShowLabels;
            document.getElementById('grid').classList.toggle('show-labels', isShowLabels);
            document.getElementById('toggle-label-btn').innerText = `編號: ${isShowLabels ? '開' : '關'}`;
            document.getElementById('toggle-label-btn').classList.toggle('bg-indigo-600', isShowLabels);
            document.getElementById('toggle-label-btn').classList.toggle('text-white', isShowLabels);
        }

        function getContrastYIQ(hex){
            hex = hex.replace("#", "");
            const r = parseInt(hex.substr(0,2),16);
            const g = parseInt(hex.substr(2,2),16);
            const b = parseInt(hex.substr(4,2),16);
            return ((r*299)+(g*587)+(b*114))/1000 >= 128 ? 'black' : 'white';
        }

        function setTool(t) {
            currentTool = t;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tool-${t}`).classList.add('active');
        }

        function selectColor(id, hex) {
            selectedColorId = id; selectedColorHex = hex;
            document.getElementById('current-color-preview').style.backgroundColor = hex;
            document.getElementById('current-color-id').innerText = id;
            document.getElementById('current-color-hex').innerText = hex.toUpperCase();
            document.querySelectorAll('.palette-btn').forEach(b => b.classList.remove('active'));
            const a = document.getElementById(`color-${id}`); if (a) a.classList.add('active');
        }

        function undo() {
            if (undoStack.length === 0) return;
            gridState = JSON.parse(undoStack.pop());
            syncCanvas();
        }

        function syncCanvas() {
            const cells = document.querySelectorAll('.pixel-cell');
            cells.forEach((c, i) => {
                const id = gridState[i]; const l = c.querySelector('.cell-label');
                if (id) {
                    const h = findHexById(id); c.style.backgroundColor = h;
                    l.innerText = id; l.style.color = getContrastYIQ(h);
                } else { c.style.backgroundColor = 'transparent'; l.innerText = ''; }
            });
            updateInventoryUI();
        }

        function findHexById(id) {
            for (const g in COLOR_DATA) { if (COLOR_DATA[g][id]) return COLOR_DATA[g][id]; }
            return "#ffffff";
        }

        function initCanvas(size) {
            currentSize = size; const g = document.getElementById('grid'); g.innerHTML = '';
            document.getElementById('top-ruler').innerHTML = ''; document.getElementById('left-ruler').innerHTML = '';
            gridState = {}; undoStack = [];
            const cs = size === 52 ? '14px' : '10px';
            document.documentElement.style.setProperty('--cell-size', cs);
            g.style.gridTemplateColumns = `repeat(${size}, ${cs})`;
            
            const tr = document.getElementById('top-ruler'); tr.style.gridTemplateColumns = `repeat(${size}, ${cs})`;
            const lr = document.getElementById('left-ruler'); lr.style.gridTemplateRows = `repeat(${size}, ${cs})`;

            for (let i = 1; i <= size; i++) {
                const lt = document.createElement('div'); lt.className = 'ruler-label'; lt.innerText = i%5===0||i===1?i:''; tr.appendChild(lt);
                const ll = document.createElement('div'); ll.className = 'ruler-label'; ll.innerText = i%5===0||i===1?i:''; lr.appendChild(ll);
            }

            const f = document.createDocumentFragment();
            for (let i = 0; i < size * size; i++) {
                const r = Math.floor(i / size) + 1; const c = i % size + 1;
                const cell = document.createElement('div'); cell.className = 'pixel-cell';
                if (c % 10 === 0 && c !== size) cell.classList.add('thick-border-right');
                if (r % 10 === 0 && r !== size) cell.classList.add('thick-border-bottom');
                const l = document.createElement('span'); l.className = 'cell-label'; cell.appendChild(l);
                
                cell.onmousedown = (e) => {
                    undoStack.push(JSON.stringify(gridState)); if (undoStack.length > 50) undoStack.shift();
                    if (currentTool === 'bucket') { floodFill(i, gridState[i], selectedColorId); syncCanvas(); }
                    else { isMouseDown = true; paintCell(cell, i); }
                };
                cell.onmouseenter = () => { if (isMouseDown) paintCell(cell, i); };
                f.appendChild(cell);
            }
            g.appendChild(f); updateInventoryUI();
            removeReferenceImage();
        }

        function paintCell(c, i) {
            const l = c.querySelector('.cell-label');
            if (currentTool === 'paint') {
                gridState[i] = selectedColorId; c.style.backgroundColor = selectedColorHex;
                l.innerText = selectedColorId; l.style.color = getContrastYIQ(selectedColorHex);
            } else if (currentTool === 'eraser') {
                delete gridState[i]; c.style.backgroundColor = 'transparent'; l.innerText = '';
            }
            updateInventoryUI();
        }

        function floodFill(idx, target, replacement) {
            if (target === replacement) return;
            const stack = [idx];
            while (stack.length > 0) {
                const c = stack.pop();
                if (gridState[c] === target) {
                    gridState[c] = replacement;
                    const r = Math.floor(c / currentSize); const col = c % currentSize;
                    if (r > 0) stack.push(c - currentSize);
                    if (r < currentSize - 1) stack.push(c + currentSize);
                    if (col > 0) stack.push(c - 1);
                    if (col < currentSize - 1) stack.push(c + 1);
                }
            }
        }

        function updateInventoryUI() {
            const counts = {}; Object.values(gridState).forEach(id => counts[id] = (counts[id] || 0) + 1);
            const list = document.getElementById('inventory-list');
            const totalSpan = document.getElementById('total-beads');
            const ids = Object.keys(counts).sort();
            if (ids.length === 0) { list.innerHTML = '無顏色'; totalSpan.innerText = '總計: 0 顆'; return; }
            let total = 0; list.innerHTML = '';
            ids.forEach(id => {
                total += counts[id]; const h = findHexById(id);
                const item = document.createElement('div');
                item.className = 'flex items-center gap-2 bg-white px-3 py-1.5 rounded-lg border shadow-sm';
                item.innerHTML = `<span class="w-4 h-4 rounded-sm border" style="background-color:${h}"></span><b>${id}</b><span class="text-indigo-500 font-mono text-xs ml-1">${counts[id]}</span>`;
                list.appendChild(item);
            });
            totalSpan.innerText = `總計: ${total} 顆`;
        }

        function changeCanvasSize(s) {
            if (confirm(`切換 ${s}x${s} 會清空進度？`)) {
                document.getElementById('size-52').classList.toggle('bg-white', s===52);
                document.getElementById('size-74').classList.toggle('bg-white', s===74);
                initCanvas(s);
            }
        }

        function clearCanvas() { if (confirm('清空畫布？')) { undoStack.push(JSON.stringify(gridState)); gridState = {}; syncCanvas(); } }

        // --- 修正版導出功能：確保字體正確 ---
        async function exportImage() {
            const scale = 30; const offset = 100;
            const gridWidth = currentSize * scale; const gridHeight = currentSize * scale;
            const counts = {}; Object.values(gridState).forEach(id => counts[id] = (counts[id] || 0) + 1);
            const sortedIds = Object.keys(counts).sort();
            
            const legendRowHeight = 60;
            const legendRows = Math.ceil(sortedIds.length / 5);
            const legendHeight = (legendRows > 0 ? (legendRows * legendRowHeight) + 120 : 0);

            const canvas = document.createElement('canvas');
            canvas.width = gridWidth + offset + 60;
            canvas.height = gridHeight + offset + legendHeight;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1e1b4b'; ctx.font = 'bold 28px Arial';
            ctx.fillText(`拼豆專用圖紙 (${currentSize}x${currentSize})`, 40, 50);

            ctx.translate(offset, offset);
            
            // 豆子
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            for (let i = 0; i < currentSize * currentSize; i++) {
                const id = gridState[i];
                if (id) {
                    const r = Math.floor(i / currentSize); const c = i % currentSize;
                    const h = findHexById(id); ctx.fillStyle = h;
                    ctx.fillRect(c * scale, r * scale, scale, scale);
                    // 導出時如果開啟了編號就印字
                    if (isShowLabels) {
                        ctx.fillStyle = getContrastYIQ(h); 
                        ctx.font = `bold ${scale * 0.35}px Arial`;
                        ctx.fillText(id, (c + 0.5) * scale, (r + 0.5) * scale);
                    }
                }
            }

            // 格線
            ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 0; i <= currentSize; i++) {
                ctx.moveTo(i * scale, 0); ctx.lineTo(i * scale, gridHeight);
                ctx.moveTo(0, i * scale); ctx.lineTo(gridWidth, i * scale);
            }
            ctx.stroke();

            // 粗線
            ctx.strokeStyle = '#4b5563'; ctx.lineWidth = 2;
            ctx.beginPath();
            for (let i = 0; i <= currentSize; i += 10) {
                ctx.moveTo(i * scale, 0); ctx.lineTo(i * scale, gridHeight);
                ctx.moveTo(0, i * scale); ctx.lineTo(gridWidth, i * scale);
            }
            ctx.strokeRect(0, 0, gridWidth, gridHeight); ctx.stroke();

            // 尺規
            ctx.fillStyle = '#6b7280'; ctx.font = 'bold 18px Arial';
            for (let i = 1; i <= currentSize; i++) {
                if (i === 1 || i % 5 === 0) {
                    ctx.textAlign = 'center'; ctx.fillText(i, (i - 0.5) * scale, -20);
                    ctx.textAlign = 'right'; ctx.fillText(i, -20, (i - 0.5) * scale + 5);
                }
            }

            // 統計
            if (sortedIds.length > 0) {
                ctx.translate(0, gridHeight + 60); ctx.fillStyle = '#4b5563'; ctx.font = 'bold 22px Arial';
                ctx.textAlign = 'left'; ctx.fillText('顏色使用清單', 0, 0);
                let xIdx = 0; let yIdx = 0;
                sortedIds.forEach(id => {
                    const x = xIdx * 180; const y = 40 + (yIdx * legendRowHeight);
                    ctx.fillStyle = findHexById(id); ctx.fillRect(x, y, 30, 30);
                    ctx.strokeStyle = '#d1d5db'; ctx.strokeRect(x, y, 30, 30);
                    ctx.fillStyle = '#1f2937'; ctx.font = 'bold 16px Arial';
                    ctx.fillText(`${id}: ${counts[id]}`, x + 40, y + 20);
                    xIdx++; if (xIdx >= 5) { xIdx = 0; yIdx++; }
                });
            }

            const link = document.createElement('a');
            link.download = `pixelart_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL(); link.click();
        }

        window.onmouseup = () => isMouseDown = false;
        window.onload = () => { initPalette(); initCanvas(52); };
    </script>
